name: Python Quality Checks

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-3 \
            libegl1 \
            libfontconfig1 \
            libgl1 \
            libopengl0 \
            libx11-xcb1 \
            libxcb-cursor0 \
            libxkbcommon-x11-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Detect modified Python directories
        id: changed_python
        shell: bash
        run: |
          set -euo pipefail

          event_name="${{ github.event_name }}"
          before_sha="${{ github.event.before }}"
          zero_sha="0000000000000000000000000000000000000000"

          if [[ -z "$before_sha" || "$before_sha" == "$zero_sha" ]]; then
            changed_files="$(git ls-files '*.py')"
          elif git cat-file -e "$before_sha^{commit}" 2>/dev/null; then
            changed_files="$(git diff --name-only "$before_sha" "$GITHUB_SHA" -- '*.py')"
          else
            echo "Previous SHA $before_sha is unavailable for $event_name; falling back to all tracked Python files."
            changed_files="$(git ls-files '*.py')"
          fi

          if [[ -z "$changed_files" ]]; then
            echo "dirs=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          dirs="$({
            printf '%s\n' "$changed_files" \
              | xargs -n1 dirname \
              | sort -u \
              | awk '
                  BEGIN {
                    count = 0
                  }
                  {
                    for (i = 1; i <= count; i++) {
                      if ($0 == kept[i] || index($0, kept[i] "/") == 1) {
                        next
                      }
                    }

                    kept[++count] = $0
                  }
                  END {
                    for (i = 1; i <= count; i++) {
                      print kept[i]
                    }
                  }
                '
          } | tr '\n' ' ' | sed 's/[[:space:]]\+$//')"
          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"

      - name: Run mypy on modified Python directories
        if: steps.changed_python.outputs.dirs != ''
        shell: bash
        run: |
          set -euo pipefail
          python -m mypy ${{ steps.changed_python.outputs.dirs }}

      - name: Run bandit on modified Python directories
        if: steps.changed_python.outputs.dirs != ''
        shell: bash
        run: |
          set -euo pipefail

          for dir in ${{ steps.changed_python.outputs.dirs }}; do
            if [[ "$dir" == tests* ]]; then
              python -m bandit -r -s B101,B105 "$dir"
            else
              python -m bandit -r "$dir"
            fi
          done

      - name: Run full test suite
        run: python -m pytest tests -q